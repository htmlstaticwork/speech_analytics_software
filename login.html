<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — VoxInsight</title>
    <meta name="description" content="Log in to VoxInsight to access call upload, sentiment analysis, agent scoreboard, alerts, and reports." />
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/dark-mode.css" rel="stylesheet" />
    <link href="assets/css/rtl.css" rel="stylesheet" />
  </head>
  <body>
    <div class="offcanvas offcanvas-top vi-offcanvas" tabindex="-1" id="viOffcanvas" aria-labelledby="viOffcanvasLabel">
      <div class="offcanvas-header">
        <div class="vi-logo" id="viOffcanvasLabel">
          <img src="assets/images/logo.svg" alt="VoxInsight Logo" height="34">
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <nav class="nav flex-column" aria-label="Mobile">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="home-2.html">Home 2</a>
          <a class="nav-link" href="services.html">Platform</a>
          <a class="nav-link" href="service-details.html">Solutions</a>
          <a class="nav-link" href="pricing.html">Pricing</a>
          <a class="nav-link" href="blog.html">Blog</a>
          <a class="nav-link" href="contact.html">Contact</a>
          <div class="mt-3 d-grid gap-2">
            <button class="btn btn-vi btn-vi-outline" type="button" data-vi-dir-toggle aria-pressed="false">
              <i class="bi bi-text-paragraph" aria-hidden="true"></i> <span class="vi-mono" data-vi-dir-label>LTR</span>
            </button>
            <button class="btn btn-vi btn-vi-outline" type="button" data-vi-theme-toggle aria-pressed="false" aria-label="Toggle theme">
              <i class="bi bi-circle-half" aria-hidden="true"></i>
            </button>
            <a class="btn btn-vi btn-vi-primary" href="dashboard.html">Dashboard</a>
            <a class="btn btn-vi btn-vi-outline" href="login.html">Login</a>
          </div>
        </nav>
      </div>
    </div>

    <main class="vi-auth">
      <div class="vi-auth-card">
        <div class="inner">
          <div class="d-flex align-items-center justify-content-between gap-2">
            <a class="vi-logo" href="index.html" aria-label="VoxInsight home">
            <img src="assets/images/logo.svg" alt="VoxInsight Logo" height="34">
          </a>  <div class="d-flex gap-2">
              <button class="btn btn-vi btn-vi-outline" type="button" data-vi-dir-toggle aria-pressed="false" aria-label="Toggle direction">
                <i class="bi bi-text-paragraph" aria-hidden="true"></i> <span class="vi-mono d-none d-sm-inline" data-vi-dir-label>LTR</span>
              </button>
              <button class="btn btn-vi btn-vi-outline" type="button" data-vi-theme-toggle aria-pressed="false" aria-label="Toggle theme">
                <i class="bi bi-circle-half" aria-hidden="true"></i>
              </button>
            </div>
          </div>

          <h1 class="h3 fw-bold mt-3 mb-1 text-center">Login</h1>

          <div class="vi-sso mt-3">
            <button class="btn btn-vi btn-vi-outline" type="button">
              <i class="bi bi-google" aria-hidden="true"></i> Google Workspace
            </button>
            <button class="btn btn-vi btn-vi-outline" type="button">
              <i class="bi bi-microsoft" aria-hidden="true"></i> Microsoft 365
            </button>
          </div>

          <div class="text-center my-3 vi-mono opacity-75">or</div>

          <form class="vi-form needs-validation" novalidate>
            <div class="d-grid gap-3">
              <div>
                <label class="form-label fw-bold" for="email">Email</label>
                <input class="form-control" id="email" type="email" autocomplete="email" required />
                <div class="invalid-feedback">Enter a valid email.</div>
              </div>
              <div>
                <label class="form-label fw-bold" for="password">Password</label>
                <input class="form-control" id="password" type="password" autocomplete="current-password" minlength="8" required />
                <div class="invalid-feedback">Enter a password (min 8 characters).</div>
              </div>
              <div class="d-flex align-items-center justify-content-between gap-2">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="remember" />
                  <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <a class="fw-bold" href="coming-soon.html">Forgot password</a>
              </div>
              <button class="btn btn-vi btn-vi-primary" type="submit">Login</button>
              <div class="small opacity-75">
                New to VoxInsight? <a class="fw-bold" href="register.html">Create an account</a>.
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
