<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — VoxInsight</title>
    <meta name="description" content="Log in to VoxInsight to access call upload, sentiment analysis, agent scoreboard, alerts, and reports." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%23A16207' d='M10 36c9 0 9-18 18-18s9 18 18 18 9-18 18-18v10c-9 0-9 18-18 18S41 28 32 28 23 46 14 46 5 28-4 28V18c9 0 9 18 14 18z'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/dark-mode.css" rel="stylesheet" />
    <link href="assets/css/rtl.css" rel="stylesheet" />
  </head>
  <body>
    <main class="vi-auth">
      <div class="vi-auth-card">
        <div class="inner">
          <div class="d-flex align-items-center justify-content-between gap-2">
            <a class="vi-logo" href="index.html" aria-label="VoxInsight home">
              <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path fill="currentColor" d="M10 36c9 0 9-18 18-18s9 18 18 18 9-18 18-18v10c-9 0-9 18-18 18S41 28 32 28 23 46 14 46 5 28-4 28V18c9 0 9 18 14 18z" />
              </svg>
              <div><strong>VoxInsight</strong><span>.</span></div>
            </a>
            <div class="d-flex gap-2">
              <button class="btn btn-vi btn-vi-outline" type="button" data-vi-dir-toggle aria-pressed="false" aria-label="Toggle direction">
                <i class="bi bi-text-paragraph" aria-hidden="true"></i> <span class="vi-mono" data-vi-dir-label>LTR</span>
              </button>
              <button class="btn btn-vi btn-vi-outline" type="button" data-vi-theme-toggle aria-pressed="false" aria-label="Toggle theme">
                <i class="bi bi-circle-half" aria-hidden="true"></i> <span class="vi-mono" data-vi-theme-label>Light</span>
              </button>
            </div>
          </div>

          <h1 class="h3 fw-bold mt-3 mb-1">Login</h1>
          <div class="opacity-75">Access call upload, sentiment analysis, and agent scoreboards.</div>

          <div class="vi-sso mt-3">
            <button class="btn btn-vi btn-vi-outline" type="button">
              <i class="bi bi-google" aria-hidden="true"></i> Google Workspace
            </button>
            <button class="btn btn-vi btn-vi-outline" type="button">
              <i class="bi bi-microsoft" aria-hidden="true"></i> Microsoft 365
            </button>
          </div>

          <div class="text-center my-3 vi-mono opacity-75">or</div>

          <form class="vi-form needs-validation" novalidate>
            <div class="d-grid gap-3">
              <div>
                <label class="form-label fw-bold" for="email">Email</label>
                <input class="form-control" id="email" type="email" autocomplete="email" required />
                <div class="invalid-feedback">Enter a valid email.</div>
              </div>
              <div>
                <label class="form-label fw-bold" for="password">Password</label>
                <input class="form-control" id="password" type="password" autocomplete="current-password" minlength="8" required />
                <div class="invalid-feedback">Enter a password (min 8 characters).</div>
              </div>
              <div class="d-flex align-items-center justify-content-between gap-2">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="remember" />
                  <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <a class="fw-bold" href="coming-soon.html">Forgot password</a>
              </div>
              <button class="btn btn-vi btn-vi-primary" type="submit">Login</button>
              <div class="small opacity-75">
                New to VoxInsight? <a class="fw-bold" href="register.html">Create an account</a>.
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
