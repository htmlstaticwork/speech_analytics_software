<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Account — VoxInsight</title>
    <meta name="description" content="Create a VoxInsight account to access call upload, sentiment analytics, agent scoreboards, alerts, and reports." />
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/dark-mode.css" rel="stylesheet" />
    <link href="assets/css/rtl.css" rel="stylesheet" />
  </head>
  <body>
    <main class="vi-auth">
      <div class="vi-auth-card">
        <div class="inner">
          <div class="d-flex align-items-center justify-content-between gap-2">
            <a class="vi-logo" href="index.html" aria-label="VoxInsight home">
            <img src="assets/images/logo.svg" alt="VoxInsight Logo" height="34">
          </a>
            <div class="d-flex gap-2">
              <button class="btn btn-vi btn-vi-outline" type="button" data-vi-dir-toggle aria-pressed="false" aria-label="Toggle direction">
                <i class="bi bi-text-paragraph" aria-hidden="true"></i> <span class="vi-mono d-none d-sm-inline" data-vi-dir-label>LTR</span>
              </button>
              <button class="btn btn-vi btn-vi-outline" type="button" data-vi-theme-toggle aria-pressed="false" aria-label="Toggle theme">
                <i class="bi bi-circle-half" aria-hidden="true"></i>
              </button>
            </div>
          </div>

          <h1 class="h3 fw-bold mt-3 mb-1 text-center">Create account</h1>

          <div class="vi-sso mt-3">
            <button class="btn btn-vi btn-vi-outline" type="button">
              <i class="bi bi-google" aria-hidden="true"></i> Google Workspace
            </button>
            <button class="btn btn-vi btn-vi-outline" type="button">
              <i class="bi bi-microsoft" aria-hidden="true"></i> Microsoft 365
            </button>
          </div>

          <div class="text-center my-3 vi-mono opacity-75">or</div>

          <form class="vi-form needs-validation" id="registerForm" novalidate>
            <div class="d-grid gap-3">
              <div>
                <label class="form-label fw-bold" for="name">Full name</label>
                <input class="form-control" id="name" type="text" autocomplete="name" required />
                <div class="invalid-feedback">Enter your full name.</div>
              </div>
              <div>
                <label class="form-label fw-bold" for="email">Email</label>
                <input class="form-control" id="email" type="email" autocomplete="email" required />
                <div class="invalid-feedback">Enter a valid email.</div>
              </div>
              <div>
                <label class="form-label fw-bold" for="password">Password</label>
                <input class="form-control" id="password" type="password" autocomplete="new-password" minlength="8" required />
                <div class="invalid-feedback">Use at least 8 characters.</div>
              </div>
              <div>
                <label class="form-label fw-bold" for="confirm">Confirm password</label>
                <input class="form-control" id="confirm" type="password" autocomplete="new-password" minlength="8" required />
                <div class="invalid-feedback">Passwords must match.</div>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="terms" required />
                <label class="form-check-label" for="terms">I agree to the Terms and Privacy Policy</label>
                <div class="invalid-feedback">You must accept to continue.</div>
              </div>
              <button class="btn btn-vi btn-vi-primary" type="submit">Create account</button>
              <div class="small opacity-75">
                Already have an account? <a class="fw-bold" href="login.html">Login</a>.
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="assets/js/main.js"></script>
    <script>
      (() => {
        const form = document.getElementById("registerForm");
        const pass = document.getElementById("password");
        const confirm = document.getElementById("confirm");
        if (!form || !pass || !confirm) return;

        const sync = () => {
          const ok = confirm.value === pass.value;
          confirm.setCustomValidity(ok ? "" : "Passwords do not match");
        };

        pass.addEventListener("input", sync);
        confirm.addEventListener("input", sync);
        form.addEventListener("submit", sync);
      })();
    </script>
  </body>
</html>
